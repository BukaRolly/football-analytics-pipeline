name: Daily Football Analytics Pipeline

on:
  schedule:
    # Every day at 1:35 AM Amsterdam time (CET/CEST)
    - cron: '35 0 * * *'
  workflow_dispatch: # allows manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests python-dotenv google-cloud-bigquery pyarrow

      # 4️⃣ Install dbt for BigQuery
      - name: Install dbt
        run: pip install dbt-bigquery

      # 5️⃣ Write GCP service account key safely
      - name: Write GCP service account key
        run: |
          mkdir -p /home/runner/
          printf "%s" "${{ secrets.GCP_BASE }}" > /home/runner/gcp_key.json

      # 6️⃣ Run Python pipeline
      - name: Run Python pipeline
        run: python pipeline.py
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
          # Use full path to service account
          GCP_BASE_PATH: /home/runner/gcp_key.json

      # 7️⃣ Run dbt models
      - name: Run dbt models
        working-directory: ./dbt
        run: dbt run --profiles-dir ./dbt
        env:
          GCP_BASE_PATH: /home/runner/gcp_key.json
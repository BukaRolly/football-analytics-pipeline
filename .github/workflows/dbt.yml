name: Daily DBT Run

on:
  schedule:
    # Every day at 1:35 AM Amsterdam time (CET/CEST)
    - cron: '35 0 * * *'
  workflow_dispatch: # allows manual trigger

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dbt-bigquery pandas google-cloud-bigquery python-dotenv pyarrow

    - name: Write GCP service account key
      run: echo "${{ secrets.GCP_BASE }}" > $HOME/gcp_key.json

    - name: Run dbt
      working-directory: ./dbt
      run: dbt run --profiles-dir ./dbt
      env:
        GCP_BASE_PATH: $HOME/gcp_key.json